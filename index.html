<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
        <h1>Doctor Appointment Form</h1>
        <hr>
        <form action="index.php" method="POST" enctype="multipart/form-data">

            <label for="date">Appointment Date:</label>
            <input type="date" id="date" required><br><br>

            <label for="time">Appointment time:</label>
            <input type="time" id="time" required><br><br>

            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="First" required>
            <input type="text" id="name" placeholder="Last" required><br><br>

            <label for="gender">Gender:</label>

            <label for="male">Male</label>
            <input type="radio" id="male" value="male" name="gender" required>
            <label for="female">Female</label>
            <input type="radio" id="female" value="female" name="gender" required><br><br>

            <label for="phone">Phone:</label>
            <input type="number" id="phone" placeholder="####" required><br><br>

            <label for="address">Address:</label>
            <input type="text" id="address" placeholder="city" required>
            <input type="text" id="address" placeholder="state" required><br><br>

            <label for="query">Your Query:</label>
            <textarea id="query" rows="7" cols="25"></textarea><br><br>

            <label for="Appointment type">Appointment Type:</label>

            <label>Select which appointment type(s) you require</label><br>

            <input type="checkbox" id="cervix checkup">
            <label for="cervix checkup">Cervix Checkup</label><br>

            <input type="checkbox" id="heart checkup" required>
            <label for="heart checkup">Heart Checkup</label><br>

            <input type="checkbox" id="eye checkup">
            <label for="eye checkup">Eye Checkup</label><br>
            
            <input type="checkbox" id="hearing test">
            <label for="hearing test">Hearing Test</label><br>

            <input type="submit">




        </form>
    </div>
    </body>
</html>
